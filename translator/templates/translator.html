<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Translator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #667eea, #764ba2);
}

.container {
    width: 95%;
    max-width: 900px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    color: white;
    box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
    gap: 10px;
}

select {
    padding: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    width: 100%;
}

.swap {
    cursor: pointer;
    font-size: 22px;
    display: flex;
    align-items: center;
}

.box {
    display: flex;
    gap: 10px;
}

textarea {
    width: 100%;
    height: 140px;
    border-radius: 15px;
    border: none;
    padding: 12px;
    resize: none;
    font-size: 14px;
    outline: none;
}

.output {
    background: rgba(255,255,255,0.2);
    color: white;
}

.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
}

button {
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    background: #00c6ff;
    color: white;
}

button:hover {
    background: #0072ff;
}

@media(max-width: 600px){
    .box {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>🌐 Smart Translator</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="top-bar">
            <!-- Source Language -->
            <select name="src" id="fromLang">
                <option value="en">English</option>
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ta">Tamil</option>
                <option value="fr">French</option>
            </select>

            <!-- Swap Button -->
            <div class="swap" onclick="swapLang()">🔁</div>

            <!-- Target Language -->
            <select name="dest" id="toLang">
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="ta">Tamil</option>
                <option value="fr">French</option>
                <option value="en">English</option>
            </select>
        </div>

        <div class="box">
            <textarea id="inputText" name="text" placeholder="Type or speak..."></textarea>
            <textarea id="outputText" class="output" readonly>{{ translated_text }}</textarea>
        </div>

        <div class="actions">
            <div>
                <button type="button" onclick="startListening()">🎤</button>
                <button type="submit">Translate</button>
            </div>

            <div>
                <button type="button" onclick="speakText()">🔊</button>
                <button type="button" onclick="copyText()">📋</button>
            </div>
        </div>

    </form>
</div>

<script>
// 🔁 Swap Languages
function swapLang() {
    let from = document.getElementById("fromLang");
    let to = document.getElementById("toLang");

    let temp = from.value;
    from.value = to.value;
    to.value = temp;

    let input = document.getElementById("inputText").value;
    let output = document.getElementById("outputText").value;

    document.getElementById("inputText").value = output;
    document.getElementById("outputText").value = input;
}

// 🎤 Voice Input (based on selected source language)
function startListening() {
    let lang = document.getElementById("fromLang").value;

    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();

    if (lang === "hi") recognition.lang = "hi-IN";
    else if (lang === "te") recognition.lang = "te-IN";
    else if (lang === "ta") recognition.lang = "ta-IN";
    else if (lang === "fr") recognition.lang = "fr-FR";
    else recognition.lang = "en-US";

    recognition.start();

    recognition.onresult = function(event) {
        document.getElementById("inputText").value = event.results[0][0].transcript;
    };
}

// 🔊 Speak Output
function speakText() {
    let text = document.getElementById("outputText").value;
    let lang = document.getElementById("toLang").value;

    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = lang;
    window.speechSynthesis.speak(speech);
}

// 📋 Copy Text
function copyText() {
    let text = document.getElementById("outputText");
    text.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
